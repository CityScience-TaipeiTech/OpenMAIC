services:
  openmaic:
    build:
      context: .
      args:
        NEXT_DISABLE_ESLINT: "1"
        NEXT_IGNORE_TS_ERRORS: "1"
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      # Optional: mount server-providers.yml for provider config
      # - ./server-providers.yml:/app/server-providers.yml:ro
      - openmaic-data:/app/data
    restart: unless-stopped

volumes:
  openmaic-data:
